r">-1</span>]*<span class="number">10</span>)/d;</span><br><span class="line">        mod[cnt] = (mod[cnt<span class="number">-1</span>]*<span class="number">10</span>)%d;</span><br><span class="line">        <span class="keyword">if</span>(mod[cnt]==<span class="number">0</span>)  <span class="keyword">break</span>;</span><br><span class="line">        <span class="keyword">for</span>(i=<span class="number">1</span>; i&lt;cnt; i++) &#123; <span class="comment">//查找余数是否存在循环，即小数循环节</span></span><br><span class="line">            <span class="keyword">if</span>(mod[i] == mod[cnt]) &#123;</span><br><span class="line">                pos=i;</span><br><span class="line">                <span class="keyword">break</span>;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">if</span>(pos!=<span class="number">0</span>) <span class="keyword">break</span>;</span><br><span class="line">        cnt++;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">"%d/%d="</span>, n, d);</span><br><span class="line">    <span class="keyword">if</span>(res[<span class="number">0</span>]!=<span class="number">0</span>) <span class="built_in">printf</span>(<span class="string">"%d"</span>, res[<span class="number">0</span>]); <span class="comment">//整数位</span></span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">"."</span>);</span><br><span class="line">    <span class="keyword">if</span>(pos==<span class="number">0</span>) &#123; <span class="comment">//没有循环节</span></span><br><span class="line">        <span class="keyword">for</span>(i=<span class="number">1</span>; i&lt;=cnt; i++) &#123;</span><br><span class="line">            <span class="built_in">printf</span>(<span class="string">"%d"</span>, res[i]);</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">    &#125; <span class="keyword">else</span> &#123; <span class="comment">//有循环节</span></span><br><span class="line">        <span class="keyword">for</span>(i=<span class="number">1</span>; i&lt;pos; i++) &#123;  <span class="comment">//注意 小数可能从后面一部分才出现循环节</span></span><br><span class="line">            <span class="built_in">printf</span>(<span class="string">"%d"</span>, res[i]);</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="built_in">printf</span>(<span class="string">"("</span>);</span><br><span class="line">        <span class="keyword">for</span>(i=pos; i&lt;cnt; i++) &#123;</span><br><span class="line">            <span class="built_in">printf</span>(<span class="string">"%d"</span>, res[i]);</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="built_in">printf</span>(<span class="string">")"</span>);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="built_in">puts</span>(<span class="string">""</span>);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line"><span class="comment">//    freopen("dataIn.txt", "r", stdin);</span></span><br><span class="line"><span class="comment">//    freopen("dataOut.txt", "w", stdout);</span></span><br><span class="line">    <span class="keyword">int</span> i;</span><br><span class="line">    <span class="keyword">for</span>(i=<span class="number">0</span>; i&lt;<span class="number">3</span>; i++) &#123;</span><br><span class="line">        <span class="built_in">scanf</span>(<span class="string">"%d/%d"</span>, &amp;N[i], &amp;D[i]);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">for</span>(i=<span class="number">0</span>; i&lt;<span class="number">3</span>; i++) &#123;</span><br><span class="line">        solve(N[i], D[i]);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
